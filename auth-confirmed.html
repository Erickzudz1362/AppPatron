<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cuenta verificada - El Patron</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #08b9c7;
        --ink: #111827;
        --muted: #68707d;
        --card: #ffffff;
        --bg: #f5fbfc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 15%, rgba(8, 185, 199, 0.16), transparent 32rem),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        padding: 24px;
      }
      .card {
        width: min(440px, 100%);
        background: var(--card);
        border: 1px solid rgba(8, 185, 199, 0.18);
        border-radius: 28px;
        padding: 34px 26px;
        text-align: center;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      }
      .logo {
        width: 108px;
        height: 108px;
        object-fit: contain;
        border-radius: 24px;
        margin-bottom: 18px;
      }
      .check {
        width: 56px;
        height: 56px;
        border-radius: 999px;
        display: inline-grid;
        place-items: center;
        background: var(--primary);
        color: white;
        font-size: 32px;
        font-weight: 900;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 8vw, 38px);
        letter-spacing: -0.04em;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.55;
      }
      .hint {
        margin-top: 22px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(8, 185, 199, 0.08);
        color: #057481;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/icon-192.png" alt="El Patron" />
      <div class="check">✓</div>
      <h1>Cuenta verificada</h1>
      <p>Tu correo fue confirmado correctamente. Ya puedes volver a El Patron e iniciar sesion con tu cuenta.</p>
      <div class="hint">Puedes cerrar esta ventana.</div>
    </main>
  </body>
</html>
